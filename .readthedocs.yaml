# .readthedocs.yaml
# Read the Docs 配置文件
# 有关详细信息，请参阅 https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  apt_packages: # 新增此部分以安装字体
    - fonts-noto-cjk # 安装 Noto CJK 字体包，包含简体中文
    # 如果还需要其他语言的 Noto 字体，可以继续添加，例如：
    # - fonts-noto-cjk-sc # 专门的简体中文 Noto 字体包，可能在某些环境中更精确
    # - fonts-noto-color-emoji # 如果文档中包含表情符号

sphinx:
  configuration: source/conf.py

python:
  install:
    - requirements: requirements.txt

formats:
  - pdf
  - htmlzip